<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator & Bill Splitter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="container">
        <div class="calculator-card">
            <header class="header">
                <h1>Tip Calculator</h1>
                <p>Split your bill instantly</p>
            </header>

            <div class="calculator-body">
                <!-- Input Section -->
                <section class="input-section">
                    <!-- Bill Amount -->
                    <div class="input-group">
                        <label for="bill-amount">Bill Amount</label>
                        <div class="input-wrapper">
                            <span class="currency-icon" aria-hidden="true">Rs</span>
                            <input type="number" id="bill-amount" placeholder="Enter bill amount" min="0" step="0.01" aria-describedby="bill-error">
                        </div>
                        <span class="error-msg" id="bill-error" aria-live="polite"></span>
                    </div>

                    <!-- Tip Selection -->
                    <div class="input-group">
                        <label for="custom-tip">Select Tip %</label>
                        <div class="tip-grid">
                            <button type="button" class="tip-btn" data-tip="10" aria-pressed="false">10%</button>
                            <button type="button" class="tip-btn active" data-tip="15" aria-pressed="true">15%</button>
                            <button type="button" class="tip-btn" data-tip="20" aria-pressed="false">20%</button>
                            <div class="custom-tip-wrapper">
                                <input type="number" id="custom-tip" placeholder="Custom" min="0" max="100" aria-describedby="tip-error">
                                <span class="percent-icon" aria-hidden="true">%</span>
                            </div>
                        </div>
                        <span class="error-msg" id="tip-error" aria-live="polite"></span>
                    </div>

                    <!-- Number of People -->
                    <div class="input-group">
                        <label for="people-count">Number of People</label>
                        <div class="input-wrapper">
                            <input type="number" id="people-count" placeholder="1" value="1" min="1" step="1" aria-describedby="people-error">
                        </div>
                        <span class="error-msg" id="people-error" aria-live="polite"></span>
                    </div>
                </section>

                <!-- Result Section -->
                <section class="result-section">
                    <div class="result-row">
                        <div class="result-label">
                            <p class="title">Tip Amount</p>
                            <p class="subtitle">Total tip</p>
                        </div>
                        <div class="result-value" id="tip-amount-display">Rs 0.00</div>
                    </div>

                    <div class="result-row">
                        <div class="result-label">
                            <p class="title">Grand Total</p>
                            <p class="subtitle">Bill + Tip</p>
                        </div>
                        <div class="result-value" id="grand-total-display">Rs 0.00</div>
                    </div>

                    <div class="result-row highlight">
                        <div class="result-label">
                            <p class="title">Per Person</p>
                            <p class="subtitle">Your share</p>
                        </div>
                        <div class="result-value" id="per-person-display">Rs 0.00</div>
                    </div>

                    <button type="button" class="reset-btn" id="reset-btn">Reset</button>
                </section>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
